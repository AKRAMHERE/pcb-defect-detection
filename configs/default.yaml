# PCB Defect Detection System - Default Configuration
# Override values here or use PCB_* environment variables

detector:
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cpu
  model_path: models/pcb_defect_v1_best.pt

training:
  model_variant: yolov8n.pt
  epochs: 50
  batch_size: 8
  imgsz: 640
  workers: 4
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 15
  amp: false       # Must be false for CPU-only training
  cache: false     # Disable for memory-constrained environments

augmentation:
  mosaic: 1.0
  degrees: 10.0
  flipud: 0.1
  fliplr: 0.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  mixup: 0.0

video:
  inference_every_n: 1     # Increase to 2-3 for low-end CPUs
  target_display_fps: 30
  webcam_resolution: [1280, 720]

output:
  images_dir: outputs/images
  videos_dir: outputs/videos
  reports_dir: outputs/reports
  models_dir: models

reporting:
  fail_threshold: 0        # 0 = any defect triggers FAIL
  report_prefix: inspection
